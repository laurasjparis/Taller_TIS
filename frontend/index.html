<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce AI Chat</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
        }

        body {
            margin: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg-color);
            background-image: radial-gradient(circle at top right, #1e293b 0%, transparent 40%),
                              radial-gradient(circle at bottom left, #1e1b4b 0%, transparent 40%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 2rem;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
        }

        header h1 {
            margin: 0;
            font-size: 2.5rem;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        main {
            flex: 1;
            padding: 3rem 10%;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
        }

        .product-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 1.5rem;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            border-color: rgba(96, 165, 250, 0.5);
        }

        .product-card h3 { margin-top: 0; font-size: 1.25rem; }
        .product-brand { color: var(--accent); font-size: 0.9rem; font-weight: bold; text-transform: uppercase; list-style: none; padding:0;}
        .product-price { font-size: 1.5rem; font-weight: bold; margin: 1rem 0; }
        .product-desc { color: var(--text-muted); font-size: 0.9rem; line-height: 1.5; }
        
        .badges-wrapper { display: flex; gap: 0.5rem; margin-top: 1rem; }
        .badge { background: rgba(59, 130, 246, 0.2); color: #93c5fd; padding: 4px 10px; border-radius: 100px; font-size: 0.8rem; }

        /* Floating Chatbot */
        #chat-widget {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            z-index: 1000;
        }

        #chat-toggle {
            background: linear-gradient(135deg, var(--accent), #8b5cf6);
            color: white;
            border: none;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(59, 130, 246, 0.4);
            transition: transform 0.3s ease;
        }
        #chat-toggle:hover { transform: scale(1.1); }

        #chat-window {
            display: none;
            position: absolute;
            bottom: 80px;
            right: 0;
            width: 350px;
            height: 500px;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            flex-direction: column;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        .chat-header {
            background: rgba(255,255,255,0.05);
            padding: 1rem;
            font-weight: bold;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .chat-message {
            max-width: 80%;
            padding: 0.8rem 1rem;
            border-radius: 15px;
            font-size: 0.9rem;
            line-height: 1.4;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .chat-message.assistant {
            background: rgba(59, 130, 246, 0.2);
            align-self: flex-start;
            border-bottom-left-radius: 5px;
            color: #e2e8f0;
        }

        .chat-message.user {
            background: #3b82f6;
            align-self: flex-end;
            border-bottom-right-radius: 5px;
            color: white;
        }

        .chat-input {
            padding: 1rem;
            border-top: 1px solid rgba(255,255,255,0.1);
            display: flex;
            gap: 0.5rem;
        }

        .chat-input input {
            flex: 1;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 0.8rem;
            border-radius: 10px;
            color: white;
            outline: none;
        }

        .chat-input button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0 1rem;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <header>
        <h1>Lumina Kicks</h1>
        <p style="color: var(--text-muted)">Catálogo Premium con IA</p>
    </header>

    <main>
        <div class="products-grid" id="products-container">
            <div style="color: var(--text-muted);">Cargando productos desde la API...</div>
        </div>
    </main>

    <!-- Floating Chatbot -->
    <div id="chat-widget">
        <div id="chat-window">
            <div class="chat-header">Asistente Gemini 🤖</div>
            <div class="chat-messages" id="chat-messages">
                <div class="chat-message assistant">¡Hola! Soy tu asistente de ventas impulsado por IA. ¿Buscas tallas o modelos específicos hoy?</div>
            </div>
            <div class="chat-input">
                <input type="text" id="chat-input-text" placeholder="Escribe tu consulta..." onkeypress="handleKeyPress(event)">
                <button onclick="sendMessage()">Enviar</button>
            </div>
        </div>
        <button id="chat-toggle" onclick="toggleChat()">💬</button>
    </div>

    <script>
        const API_URL = "http://localhost:8000";
        const SESSION_ID = "frontend_user_00" + Math.floor(Math.random()*100);

        // Fetch de productos al cargar
        async function fetchProducts() {
            try {
                const response = await fetch(`${API_URL}/products`);
                const products = await response.json();
                const container = document.getElementById("products-container");
                container.innerHTML = "";

                products.forEach(p => {
                    container.innerHTML += `
                        <div class="product-card">
                            <ul class="product-brand"><li>${p.brand}</li></ul>
                            <h3>${p.name}</h3>
                            <div class="product-price">$${p.price.toFixed(2)}</div>
                            <p class="product-desc">${p.description}</p>
                            <div class="badges-wrapper">
                                <span class="badge">Talla: ${p.size}</span>
                                <span class="badge">${p.color}</span>
                                <span class="badge">Stock: ${p.stock}</span>
                            </div>
                        </div>
                    `;
                });
            } catch (err) {
                document.getElementById("products-container").innerHTML = "<p>Error conectando a la API de FastAPI. ¿Está encendida en el puerto 8000?</p>";
            }
        }

        // Chat logic
        function toggleChat() {
            const w = document.getElementById("chat-window");
            w.style.display = w.style.display === "flex" ? "none" : "flex";
        }

        function appendMessage(role, text) {
            const container = document.getElementById("chat-messages");
            container.innerHTML += `<div class="chat-message ${role}">${text}</div>`;
            container.scrollTop = container.scrollHeight;
        }

        async function sendMessage() {
            const input = document.getElementById("chat-input-text");
            const text = input.value.trim();
            if(!text) return;
            
            appendMessage("user", text);
            input.value = "";
            
            // Loading placeholder
            const container = document.getElementById("chat-messages");
            const loadingId = "load-" + Date.now();
            container.innerHTML += `<div class="chat-message assistant" id="${loadingId}">...</div>`;
            container.scrollTop = container.scrollHeight;

            try {
                const res = await fetch(`${API_URL}/chat`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ session_id: SESSION_ID, message: text })
                });
                const data = await res.json();
                document.getElementById(loadingId).remove();
                appendMessage("assistant", data.assistant_message);
            } catch (err) {
                document.getElementById(loadingId).remove();
                appendMessage("assistant", "Hubo un fallo de conexión. Intenta nuevamente.");
            }
        }

        function handleKeyPress(e) {
            if(e.key === "Enter") sendMessage();
        }

        window.onload = fetchProducts;
    </script>
</body>
</html>
