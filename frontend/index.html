<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lau Kicks - Tienda IA</title>
    <style>
        :root {
            --bg-color: #1f121a; /* Oscuro con tono cereza */
            --card-bg: rgba(46, 26, 36, 0.7);
            --text-main: #fdf2f8; /* Rosa casi blanco */
            --text-muted: #f4bce3; /* Rosa pastel suave */
            --accent: #f472b6; /* Rosa vibrante */
            --accent-hover: #db2777; /* Rosa oscuro */
        }

        body {
            margin: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg-color);
            background-image: radial-gradient(circle at top right, #3b1e2c 0%, transparent 40%),
                              radial-gradient(circle at bottom left, #4b1b34 0%, transparent 40%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 2rem;
            text-align: center;
            border-bottom: 1px solid rgba(244, 114, 182, 0.2);
            backdrop-filter: blur(10px);
        }

        header h1 {
            margin: 0;
            font-size: 3rem;
            background: linear-gradient(to right, #f472b6, #fb7185);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        main {
            flex: 1;
            padding: 3rem 10%;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
        }

        .product-card {
            background: var(--card-bg);
            border: 1px solid rgba(244, 114, 182, 0.1);
            border-radius: 16px;
            padding: 1.5rem;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(219, 39, 119, 0.3);
            border-color: rgba(244, 114, 182, 0.6);
        }

        .product-card h3 { margin-top: 0; font-size: 1.25rem; }
        .product-brand { color: var(--accent); font-size: 0.9rem; font-weight: bold; text-transform: uppercase; list-style: none; padding:0;}
        .product-price { font-size: 1.5rem; font-weight: bold; margin: 1rem 0; color: #fdf2f8;}
        .product-desc { color: var(--text-muted); font-size: 0.9rem; line-height: 1.5; }
        
        .badges-wrapper { display: flex; gap: 0.5rem; margin-top: 1rem; }
        .badge { background: rgba(244, 114, 182, 0.2); color: #fbcfe8; padding: 4px 10px; border-radius: 100px; font-size: 0.8rem; border: 1px solid rgba(244,114,182,0.3);}

        /* Floating Chatbot */
        #chat-widget {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            z-index: 1000;
        }

        #chat-toggle {
            background: linear-gradient(135deg, #f472b6, #e11d48);
            color: white;
            border: none;
            border-radius: 50%;
            width: 65px;
            height: 65px;
            font-size: 1.8rem;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(219, 39, 119, 0.5);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #chat-toggle:hover { transform: scale(1.1); box-shadow: 0 4px 25px rgba(219, 39, 119, 0.8); }

        #chat-window {
            display: none;
            position: absolute;
            bottom: 85px;
            right: 0;
            width: 350px;
            height: 500px;
            background: rgba(31, 18, 26, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(244, 114, 182, 0.2);
            border-radius: 20px;
            flex-direction: column;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        .chat-header {
            background: linear-gradient(to right, rgba(219, 39, 119, 0.2), rgba(244, 114, 182, 0.1));
            padding: 1.2rem;
            font-weight: bold;
            font-size: 1.1rem;
            border-bottom: 1px solid rgba(244, 114, 182, 0.2);
            color: #fce7f3;
            text-align: center;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .chat-message {
            max-width: 80%;
            padding: 0.9rem 1.1rem;
            border-radius: 18px;
            font-size: 0.9rem;
            line-height: 1.4;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .chat-message.assistant {
            background: rgba(244, 114, 182, 0.15);
            border: 1px solid rgba(244, 114, 182, 0.2);
            align-self: flex-start;
            border-bottom-left-radius: 5px;
            color: #fdf2f8;
        }

        .chat-message.user {
            background: var(--accent-hover);
            align-self: flex-end;
            border-bottom-right-radius: 5px;
            color: white;
            box-shadow: 0 4px 15px rgba(219, 39, 119, 0.3);
        }

        .chat-input {
            padding: 1rem;
            background: rgba(46, 26, 36, 0.5);
            border-top: 1px solid rgba(244, 114, 182, 0.1);
            display: flex;
            gap: 0.5rem;
        }

        .chat-input input {
            flex: 1;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(244, 114, 182, 0.3);
            padding: 0.8rem 1rem;
            border-radius: 20px;
            color: white;
            outline: none;
            transition: border-color 0.3s ease;
        }
        
        .chat-input input:focus {
            border-color: var(--accent);
        }

        .chat-input button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0 1.2rem;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s ease;
        }
        
        .chat-input button:hover {
            background: var(--accent-hover);
        }
    </style>
</head>
<body>

    <header>
        <h1>Lau Kicks ✨</h1>
        <p style="color: var(--text-muted); font-size: 1.1rem; letter-spacing: 1px;">Smart Sneaker Boutique</p>
    </header>

    <main>
        <div class="products-grid" id="products-container">
            <div style="color: var(--accent); font-weight: bold; text-align: center; width: 100%;">💖 Conectando con la pasarela de moda...</div>
        </div>
    </main>

    <!-- Floating Chatbot -->
    <div id="chat-widget">
        <div id="chat-window">
            <div class="chat-header">Asesora Bot IA 🎀</div>
            <div class="chat-messages" id="chat-messages">
                <div class="chat-message assistant">¡Hola linda! Soy tu asesora personal de Lau Kicks. ¿Buscas tallas o un estilo de zapatos en especial para hoy?</div>
            </div>
            <div class="chat-input">
                <input type="text" id="chat-input-text" placeholder="Escribe tu consulta..." onkeypress="handleKeyPress(event)">
                <button onclick="sendMessage()">Enviar</button>
            </div>
        </div>
        <button id="chat-toggle" onclick="toggleChat()">✨</button>
    </div>

    <script>
        const API_URL = "/api";
        const SESSION_ID = "lau_kicks_vip_00" + Math.floor(Math.random()*100);

        // Fetch de productos al cargar
        async function fetchProducts() {
            try {
                const response = await fetch(`${API_URL}/products`);
                const products = await response.json();
                const container = document.getElementById("products-container");
                container.innerHTML = "";

                products.forEach(p => {
                    container.innerHTML += `
                        <div class="product-card">
                            <ul class="product-brand"><li>${p.brand}</li></ul>
                            <h3>${p.name}</h3>
                            <div class="product-price">$${p.price.toFixed(2)}</div>
                            <p class="product-desc">${p.description}</p>
                            <div class="badges-wrapper">
                                <span class="badge">Talla: ${p.size}</span>
                                <span class="badge">${p.color}</span>
                                <span class="badge">Disponibles: ${p.stock}</span>
                            </div>
                        </div>
                    `;
                });
            } catch (err) {
                document.getElementById("products-container").innerHTML = "<p style='color: #f472b6;'>Error conectando a la API. ¿Está encendida?</p>";
            }
        }

        function toggleChat() {
            const w = document.getElementById("chat-window");
            w.style.display = w.style.display === "flex" ? "none" : "flex";
        }

        function appendMessage(role, text) {
            const container = document.getElementById("chat-messages");
            container.innerHTML += `<div class="chat-message ${role}">${text}</div>`;
            container.scrollTop = container.scrollHeight;
        }

        async function sendMessage() {
            const input = document.getElementById("chat-input-text");
            const text = input.value.trim();
            if(!text) return;
            
            appendMessage("user", text);
            input.value = "";
            
            // Loading placeholder
            const container = document.getElementById("chat-messages");
            const loadingId = "load-" + Date.now();
            container.innerHTML += `<div class="chat-message assistant" id="${loadingId}">Escribiendo... 🌸</div>`;
            container.scrollTop = container.scrollHeight;

            try {
                const res = await fetch(`${API_URL}/chat`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ session_id: SESSION_ID, message: text })
                });
                const data = await res.json();
                document.getElementById(loadingId).remove();
                appendMessage("assistant", data.assistant_message);
            } catch (err) {
                document.getElementById(loadingId).remove();
                appendMessage("assistant", "Uy, me desconecté un segundo. ¡Intenta enviarlo de nuevo! 🎀");
            }
        }

        function handleKeyPress(e) {
            if(e.key === "Enter") sendMessage();
        }

        window.onload = fetchProducts;
    </script>
</body>
</html>
